<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Mountain Stitch Sewing Co.</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>Mountain Stitch Sewing Co.</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="page-header">
    <div class="container">
        <h2>Contact Us</h2>
        <p>Request a quote or ask a question.</p>
    </div>
</section>

<section class="content">
    <div class="container">

        <form class="contact-form">

            <label>Name</label>
            <input type="text" placeholder="Your Name">

            <label>Email</label>
            <input type="email" placeholder="Your Email">

            <label>Phone</label>
            <input type="tel" placeholder="Your Phone Number">

            <label>Message</label>
            <textarea rows="6" placeholder="How can we help?"></textarea>

            <button type="submit" class="btn">
                Send Message
            </button>

        </form>

    </div>
</section>

<footer>
    <div class="container">
        <p>© 2026 Mountain Stitch Sewing Co.</p>
        <p>Website Example Created by ETJ Web Design</p>
    </div>
</footer>

</body>
</html>
